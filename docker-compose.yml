services:
  postgres:
    image: postgres:16
    container_name: nextcut-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: nextcut
    ports:
      - "5432:5432"
    volumes:
      - nextcut_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d nextcut"]
      interval: 10s
      timeout: 5s
      retries: 8

  redis:
    image: redis:7
    container_name: nextcut-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - nextcut_redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 8

volumes:
  nextcut_postgres_data:
  nextcut_redis_data:
